<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup Winner Predictor</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success: #10b981;
            --fail: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        h1 {
            margin-top: 0;
            font-size: 1.875rem;
            font-weight: 700;
            background: linear-gradient(to right, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #result {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 0.5rem;
            display: none;
        }

        .result-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .winner {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .not-winner {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--fail);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>FIFA World Cup Predictor</h1>
            <p class="subtitle">Predict if a team can win the World Cup using our ML Pipeline</p>

            <form id="predict-form">
                <div class="form-group">
                    <label for="fifa_rank">FIFA Rank (Pre-Tournament)</label>
                    <input type="number" id="fifa_rank" value="1" min="1" required>
                </div>
                <div class="form-group">
                    <label for="market_value">Squad Total Market Value (€)</label>
                    <input type="number" id="market_value" value="1000000000" min="0" required>
                </div>
                <div class="form-group">
                    <label for="wins">Wins (Last 4 Years)</label>
                    <input type="number" id="wins" value="30" min="0" required>
                </div>
                <div class="form-group">
                    <label for="titles">World Cup Titles (Before)</label>
                    <input type="number" id="titles" value="5" min="0" required>
                </div>
                <div class="form-group">
                    <label for="is_host">Is Host Nation?</label>
                    <select id="is_host">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <button type="submit">Predict Outcome</button>
            </form>

            <div class="loading" id="loading">Consulting the ML Oracle...</div>

            <div id="result">
                <div class="result-title" id="result-title">Prediction</div>
                <div class="result-value" id="prediction-text"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('predict-form');
        const resultDiv = document.getElementById('result');
        const predictionText = document.getElementById('prediction-text');
        const resultTitle = document.getElementById('result-title');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            resultDiv.style.display = 'none';
            resultDiv.className = '';
            loading.style.display = 'block';

            const features = {
                "fifa_rank_pre_tournament": parseInt(document.getElementById('fifa_rank').value),
                "squad_total_market_value_eur": parseInt(document.getElementById('market_value').value),
                "wins_last_4y": parseInt(document.getElementById('wins').value),
                "world_cup_titles_before": parseInt(document.getElementById('titles').value),
                "is_host": parseInt(document.getElementById('is_host').value)
            };

            try {
                const response = await fetch('/api/predict/fifa', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(features)
                });

                if (!response.ok) {
                    throw new Error('Prediction failed. Make sure the model exists and backend is running.');
                }

                const data = await response.json();
                
                let isWinner = data.prediction === 1;
                
                resultDiv.classList.add(isWinner ? 'winner' : 'not-winner');
                predictionText.innerHTML = isWinner ? '🏆 LIKELY WINNER' : '❌ UNLIKELY WINNER';
                
                if (data.probability) {
                    const probStr = (data.probability[data.prediction] * 100).toFixed(1);
                    predictionText.innerHTML += ` <br><span style="font-size: 0.875rem; font-weight: normal; opacity: 0.8;">(${probStr}% confidence)</span>`;
                }

                resultDiv.style.display = 'block';
            } catch (error) {
                alert(error.message);
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
