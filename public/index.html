<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Predictor</title>
    <!-- Google Fonts: 8-bit style -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #0ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-color: #0a0a0a;
            --border-pixel: 4px solid var(--neon-green);
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--neon-green);
            margin: 0;
            padding: 2rem 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            line-height: 1.5;
            text-shadow: 2px 2px 0px #000;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 0 1.5rem;
            box-sizing: border-box;
            z-index: 10;
        }

        .card {
            background: #000;
            border: var(--border-pixel);
            padding: 2rem;
            box-shadow: 8px 8px 0px var(--neon-blue);
            margin-bottom: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 4px dashed var(--neon-pink);
            padding-bottom: 1.5rem;
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            color: var(--neon-yellow);
            text-shadow: 3px 3px 0px var(--neon-pink);
            line-height: 1.8;
        }

        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        p.subtitle {
            font-size: 0.7rem;
            color: var(--neon-blue);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #000;
            color: var(--neon-green);
            border: var(--border-pixel);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            padding: 1rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--neon-green);
            transition: transform 0.1s;
        }

        .tab-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px;
        }

        .tab-btn.active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 4px 4px 0px var(--neon-pink);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Single Team Predict */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            margin-bottom: 2rem;
        }

        select {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
            background-color: #000;
            border: var(--border-pixel);
            color: var(--neon-yellow);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--neon-pink);
        }

        button.action-btn {
            padding: 1.2rem 2rem;
            background: var(--neon-pink);
            color: #fff;
            border: 4px solid #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--neon-blue);
        }

        button.action-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Area */
        #result-container { display: none; margin-top: 2rem; }

        .result-card {
            background: #111;
            padding: 2rem;
            border: 4px dashed var(--neon-yellow);
            text-align: center;
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--neon-blue);
            margin-bottom: 1.5rem;
        }

        .result-value {
            font-size: 1.2rem;
            color: var(--neon-green);
            margin-bottom: 3rem;
            line-height: 1.5;
        }

        /* 8-bit Progress Bar */
        .stage-track {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 0 auto;
            max-width: 500px;
            text-align: left;
        }

        .stage-node {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.7rem;
            color: #555;
            opacity: 0.5;
        }

        .stage-node.active {
            color: var(--neon-yellow);
            opacity: 1;
        }
        
        .stage-node.active-current {
            color: var(--neon-green);
            animation: blinker 1s linear infinite;
        }

        .node-box {
            width: 20px;
            height: 20px;
            background: #000;
            border: 2px solid #555;
        }

        .stage-node.active .node-box {
            background: var(--neon-yellow);
            border-color: var(--neon-yellow);
        }
        .stage-node.active-current .node-box {
            background: var(--neon-green);
            border-color: var(--neon-green);
        }

        /* Leaderboard View */
        .leaderboard { display: flex; flex-direction: column; gap: 2rem; margin-top: 1rem;}
        
        .lb-group {
            border: var(--border-pixel);
            padding: 1.5rem;
            background: #0a0a0a;
        }

        .lb-title {
            font-size: 0.8rem;
            color: var(--neon-pink);
            margin-bottom: 1.5rem;
            border-bottom: 2px dashed #333;
            padding-bottom: 1rem;
            line-height: 1.5;
        }

        .lb-teams {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        .lb-team {
            background: #000;
            color: var(--neon-blue);
            padding: 0.8rem;
            border: 2px solid var(--neon-blue);
            font-size: 0.6rem;
            text-align: center;
        }

        .lb-group.winner { border-color: var(--neon-yellow); box-shadow: 6px 6px 0px var(--neon-yellow);}
        .lb-group.winner .lb-title { color: var(--neon-yellow); }
        .lb-group.winner .lb-team { border-color: var(--neon-yellow); color: var(--neon-yellow); animation: blinker 1.5s linear infinite; }

        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .tab-btn { font-size: 0.6rem; }
            .result-value { font-size: 1rem; }
            .lb-team { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div style="font-size: 1rem; color: var(--neon-pink);" class="blink" id="loading-text">LOADING...</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>2026 FIFA WORLD CUP<br><span style="color:var(--neon-green)">AI PREDICTOR</span></h1>
                <p class="subtitle">48 TEAMS. 104 MATCHES. 1 CHAMPION.</p>
                <p class="subtitle blink" style="margin-top:1rem; color:var(--neon-pink);">INSERT COIN</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tab-predict')">1 PLAYER (SELECT TEAM)</button>
                <button class="tab-btn" onclick="switchTab('tab-leaderboard'); loadLeaderboard();">HIGH SCORES (BRACKET)</button>
            </div>

            <!-- Single Team Prediction -->
            <div id="tab-predict" class="tab-content active">
                <div class="search-box">
                    <select id="team-select" disabled>
                        <option value="">LOADING ROSTER...</option>
                    </select>
                    <button class="action-btn" id="predict-btn" disabled onclick="predictTeam()">START GAME</button>
                </div>

                <div id="result-container">
                    <div class="result-card" id="result-card">
                        <div class="result-label" id="result-team-name">PLAYER 1</div>
                        <div class="result-value blink" id="prediction-text">GAME OVER</div>
                        
                        <div class="stage-track" id="stage-track">
                            <div class="stage-node" id="node-0"><div class="node-box"></div> GROUP STAGE / R32 / R16</div>
                            <div class="stage-node" id="node-1"><div class="node-box"></div> QUARTER-FINALS</div>
                            <div class="stage-node" id="node-2"><div class="node-box"></div> SEMI-FINALS</div>
                            <div class="stage-node" id="node-3"><div class="node-box"></div> FINAL</div>
                            <div class="stage-node" id="node-4"><div class="node-box"></div> 2026 CHAMPION!</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Full Leaderboard -->
            <div id="tab-leaderboard" class="tab-content">
                <div class="leaderboard" id="leaderboard-container">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>
    </div>

    <script>
        const stageNames = [
            'ELIMINATED EARLY (GROUP / R32 / R16)', 
            'ADVANCES TO QUARTER-FINALS', 
            'ADVANCES TO SEMI-FINALS', 
            'REACHES THE FINAL', 
            '🏆 2026 WORLD CUP CHAMPION 🏆'
        ];
        let teamsLoaded = false;

        // Initialize
        window.onload = async () => {
            try {
                const res = await fetch('/api/teams');
                const data = await res.json();
                const select = document.getElementById('team-select');
                select.innerHTML = '<option value="" disabled selected>CHOOSE YOUR TEAM...</option>';
                data.teams.forEach(t => {
                    select.innerHTML += `<option value="${t}">${t.toUpperCase()}</option>`;
                });
                select.disabled = false;
                document.getElementById('predict-btn').disabled = false;
            } catch (e) {
                console.error("Failed to load teams", e);
                document.getElementById('team-select').innerHTML = '<option>ERROR LOADING ROSTER</option>';
            }
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function predictTeam() {
            const team = document.getElementById('team-select').value;
            if(!team) return alert("SELECT A TEAM TO CONTINUE!");

            const resultContainer = document.getElementById('result-container');
            resultContainer.style.display = 'none';
            showLoading("CALCULATING FATE...");

            for(let i=0; i<=4; i++) {
                const node = document.getElementById('node-'+i);
                node.className = 'stage-node';
            }

            try {
                const response = await fetch('/api/predict/team', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({team: team})
                });

                if (!response.ok) throw new Error('CONNECTION LOST.');
                const data = await response.json();
                
                setTimeout(() => {
                    hideLoading();
                    resultContainer.style.display = 'block';

                    const stage = data.prediction;
                    
                    document.getElementById('result-team-name').innerText = team.toUpperCase() + " PREDICTION";
                    document.getElementById('prediction-text').innerText = stageNames[stage];
                    
                    // Retro level-up animation
                    for(let i=0; i<=stage; i++) {
                        setTimeout(() => {
                            const node = document.getElementById('node-'+i);
                            node.classList.add('active');
                            if(i === stage) {
                                node.classList.add('active-current');
                                if(stage === 4) triggerConfetti();
                            }
                        }, i * 400);
                    }
                }, 800);
            } catch (error) {
                hideLoading();
                alert(error.message);
            }
        }

        async function loadLeaderboard() {
            if(teamsLoaded) return;
            showLoading("GENERATING BRACKET...");
            
            try {
                const response = await fetch('/api/predict/all');
                const data = await response.json();
                
                const container = document.getElementById('leaderboard-container');
                container.innerHTML = '';

                const groups = {4:[], 3:[], 2:[], 1:[], 0:[]};
                data.leaderboard.forEach(item => {
                    groups[item.prediction].push(item.team);
                });

                for(let i=4; i>=0; i--) {
                    if(groups[i].length === 0) continue;
                    
                    let isWinner = i === 4 ? 'winner' : '';
                    let html = `<div class="lb-group ${isWinner}">
                        <div class="lb-title">
                            LEVEL ${i}: ${stageNames[i]} [${groups[i].length} TEAMS]
                        </div>
                        <div class="lb-teams">`;
                    
                    groups[i].forEach(team => {
                        html += `<div class="lb-team">${team.toUpperCase()}</div>`;
                    });
                    
                    html += `</div></div>`;
                    container.innerHTML += html;
                }
                teamsLoaded = true;
                setTimeout(() => hideLoading(), 500);
            } catch (e) {
                hideLoading();
                alert("ERROR LOADING HIGH SCORES");
            }
        }

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function triggerConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100, colors: ['#39ff14', '#0ff', '#ff00ff', '#ffff00'] };
            function random(min, max) { return Math.random() * (max - min) + min; }
            var interval = setInterval(function() {
                var timeLeft = end - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
