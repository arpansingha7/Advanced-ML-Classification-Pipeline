<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup AI Predictor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --secondary: #8b5cf6;
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
            --stage-0: #ef4444; /* Red */
            --stage-1: #f97316; /* Orange */
            --stage-2: #eab308; /* Yellow */
            --stage-3: #10b981; /* Green */
            --stage-4: #06b6d4; /* Cyan/Winner */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.15), transparent 30%);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 0 2rem;
            box-sizing: border-box;
            margin-top: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            justify-content: center;
        }
        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .tab-btn:hover:not(.active) {
            color: white;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Predict Single Team View */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        select {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1.2rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background-color: rgba(0, 0, 0, 0.5);
        }

        button.action-btn {
            padding: 1rem 3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        button.action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Results Area */
        #result-container { display: none; margin-top: 2rem; }

        .result-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .result-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px currentColor;
        }

        /* Stage Progress Bar */
        .stage-track {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 2rem auto;
            max-width: 600px;
        }

        .stage-track::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0; height: 4px;
            background: var(--border-color);
            transform: translateY(-50%);
            z-index: 1;
        }

        .stage-track-fill {
            position: absolute;
            top: 50%; left: 0; height: 4px;
            background: currentColor;
            transform: translateY(-50%);
            z-index: 2;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        .stage-node {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            position: relative; z-index: 3;
            display: flex; justify-content: center; align-items: center;
            font-weight: 700; color: var(--text-muted);
            transition: all 0.5s ease;
        }

        .stage-node.active {
            border-color: currentColor; color: white;
            box-shadow: 0 0 15px currentColor; background: currentColor;
        }

        .stage-node-label {
            position: absolute; top: 50px; font-size: 0.75rem;
            white-space: nowrap; color: var(--text-muted); text-transform: uppercase;
        }

        /* Leaderboard View */
        .leaderboard { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;}
        .lb-group {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }
        .lb-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .lb-teams {
            display: flex; flex-wrap: wrap; gap: 0.5rem;
        }
        .lb-team {
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
        }

        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(10px); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite; margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .stage-node-label { font-size: 0.6rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div style="font-weight: 700; letter-spacing: 0.1em; font-size: 1.2rem; background: linear-gradient(135deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" id="loading-text">CONSULTING AI...</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>2026 World Cup AI Predictions</h1>
                <p class="subtitle">Select a team or view the entire tournament forecast!</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tab-predict')">Predict a Team</button>
                <button class="tab-btn" onclick="switchTab('tab-leaderboard'); loadLeaderboard();">Full Tournament Bracket</button>
            </div>

            <!-- Single Team Prediction -->
            <div id="tab-predict" class="tab-content active">
                <div class="search-box">
                    <select id="team-select" disabled>
                        <option value="">Loading teams...</option>
                    </select>
                    <button class="action-btn" id="predict-btn" disabled onclick="predictTeam()">Predict Fate</button>
                </div>

                <div id="result-container">
                    <div class="result-card" id="result-card">
                        <div class="result-label" id="result-team-name">TEAM NAME</div>
                        <div class="result-value" id="prediction-text">WINNER</div>
                        
                        <div class="stage-track" id="stage-track">
                            <div class="stage-track-fill" id="track-fill"></div>
                            <div class="stage-node" id="node-0"><div class="stage-node-label">Group/R16</div></div>
                            <div class="stage-node" id="node-1"><div class="stage-node-label">Quarter-Finals</div></div>
                            <div class="stage-node" id="node-2"><div class="stage-node-label">Semi-Finals</div></div>
                            <div class="stage-node" id="node-3"><div class="stage-node-label">Finals</div></div>
                            <div class="stage-node" id="node-4"><div class="stage-node-label">Winner</div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Full Leaderboard -->
            <div id="tab-leaderboard" class="tab-content">
                <div class="leaderboard" id="leaderboard-container">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>
    </div>

    <script>
        const stageColors = ['var(--stage-0)', 'var(--stage-1)', 'var(--stage-2)', 'var(--stage-3)', 'var(--stage-4)'];
        const stageNames = ['EARLY ELIMINATION (GROUP/R16)', 'QUARTER-FINALIST', 'SEMI-FINALIST', 'TOURNAMENT FINALIST', '🏆 WORLD CUP WINNER 🏆'];
        let teamsLoaded = false;

        // Initialize
        window.onload = async () => {
            try {
                const res = await fetch('/api/teams');
                const data = await res.json();
                const select = document.getElementById('team-select');
                select.innerHTML = '<option value="" disabled selected>Select a 2026 Team...</option>';
                data.teams.forEach(t => {
                    select.innerHTML += `<option value="${t}">${t}</option>`;
                });
                select.disabled = false;
                document.getElementById('predict-btn').disabled = false;
            } catch (e) {
                console.error("Failed to load teams", e);
                document.getElementById('team-select').innerHTML = '<option>Error loading teams</option>';
            }
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function predictTeam() {
            const team = document.getElementById('team-select').value;
            if(!team) return alert("Please select a team!");

            const resultContainer = document.getElementById('result-container');
            resultContainer.style.display = 'none';
            showLoading("ANALYZING " + team.toUpperCase() + "...");

            for(let i=0; i<=4; i++) {
                document.getElementById('node-'+i).className = 'stage-node';
                document.getElementById('node-'+i).style.color = '';
            }

            try {
                const response = await fetch('/api/predict/team', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({team: team})
                });

                if (!response.ok) throw new Error('Prediction failed.');
                const data = await response.json();
                
                setTimeout(() => {
                    hideLoading();
                    resultContainer.style.display = 'block';

                    const stage = data.prediction;
                    const color = stageColors[stage];
                    
                    const rc = document.getElementById('result-card');
                    rc.style.color = color;
                    document.getElementById('result-team-name').innerText = team.toUpperCase() + " PREDICTION";
                    document.getElementById('prediction-text').innerText = stageNames[stage];
                    
                    const trackFill = document.getElementById('track-fill');
                    setTimeout(() => {
                        trackFill.style.width = (stage * 25) + '%';
                        trackFill.style.color = color;
                        for(let i=0; i<=stage; i++) {
                            setTimeout(() => {
                                const node = document.getElementById('node-'+i);
                                node.classList.add('active');
                                node.style.color = color;
                                if(i === 4 && stage === 4) triggerConfetti();
                            }, i * 250);
                        }
                    }, 100);
                }, 800);
            } catch (error) {
                hideLoading();
                alert(error.message);
            }
        }

        async function loadLeaderboard() {
            if(teamsLoaded) return;
            showLoading("GENERATING FULL TOURNAMENT...");
            
            try {
                const response = await fetch('/api/predict/all');
                const data = await response.json();
                
                const container = document.getElementById('leaderboard-container');
                container.innerHTML = '';

                // Group by stage
                const groups = {4:[], 3:[], 2:[], 1:[], 0:[]};
                data.leaderboard.forEach(item => {
                    groups[item.prediction].push(item.team);
                });

                for(let i=4; i>=0; i--) {
                    if(groups[i].length === 0) continue;
                    
                    let html = `<div class="lb-group" style="border-left: 4px solid ${stageColors[i]}">
                        <div class="lb-title" style="color: ${stageColors[i]}">
                            ${i===4 ? '🏆 ' : ''}${stageNames[i]} (${groups[i].length})
                        </div>
                        <div class="lb-teams">`;
                    
                    groups[i].forEach(team => {
                        html += `<div class="lb-team">${team}</div>`;
                    });
                    
                    html += `</div></div>`;
                    container.innerHTML += html;
                }
                teamsLoaded = true;
                setTimeout(() => hideLoading(), 500);
            } catch (e) {
                hideLoading();
                alert("Failed to load leaderboard");
            }
        }

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function triggerConfetti() {
            var duration = 4 * 1000;
            var end = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };
            function random(min, max) { return Math.random() * (max - min) + min; }
            var interval = setInterval(function() {
                var timeLeft = end - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
