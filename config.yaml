# Core project configuration

directories:
  data_raw: "data/raw"
  data_processed: "data/processed"
  models: "models"
  reports: "reports"

random_state: 42

# Default hyperparameter grids
param_grids:
  logistic_regression:
    C: [0.1, 1.0, 10.0]
    solver: ['lbfgs', 'liblinear']
  random_forest:
    n_estimators: [50, 100, 200]
    max_depth: [None, 10, 20]
  svm:
    C: [0.1, 1.0, 10.0]
    kernel: ['linear', 'rbf']
