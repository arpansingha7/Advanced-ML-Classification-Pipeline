# Core project configuration

directories:
  data_raw: "data/raw"
  data_processed: "data/processed"
  models: "models"
  reports: "reports"

random_state: 42

# Default hyperparameter grids
param_grids:
  logistic_regression:
    C: [0.1, 1.0]
    solver: ['lbfgs']
  random_forest:
    n_estimators: [50]
    max_depth: [5, 10]
  svm:
    C: [0.1, 1.0]
    kernel: ['linear', 'rbf']
  decision_tree:
    max_depth: [5, 10]
  gradient_boosting:
    n_estimators: [50]
    learning_rate: [0.1]
  knn:
    n_neighbors: [3, 5]
